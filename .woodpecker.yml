when:
  event:
    - push
    - manual

steps:
  build_and_deploy_ui:
    image: docker:27.3-cli
    pull: true
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - echo "Building and deploying UI container only..."
      - docker compose -f ElonTweetPredictorUI/PythonScript/docker-compose.yml build --no-cache tweet-predictor-ui
      - docker compose -f ElonTweetPredictorUI/PythonScript/docker-compose.yml up -d --force-recreate --no-deps tweet-predictor-ui