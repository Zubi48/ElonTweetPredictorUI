services:
  tweet-predictor-ui:
    image: elon-tweet-predictor-ui:latest
    build:
      context: ./ElonTweetPredictorUI
      dockerfile: Dockerfile
    container_name: elon-tweet-predictor-ui
    restart: unless-stopped
    user: "0:0"
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ASPNETCORE_ENVIRONMENT: Production
      DataPath: /app/data
      DataPathV2: /app/data-v2
      TZ: America/New_York
      PredictorContainerName: elon-tweet-predictor
    volumes:
      - predictor-data:/app/data
      - polymarket-bot-v2-data:/app/data-v2
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy

      - traefik.http.routers.elon.rule=Host(`elon.incuzentric.com`)
      - traefik.http.routers.elon.entrypoints=websecure
      - traefik.http.routers.elon.tls.certresolver=le
      - traefik.http.routers.elon.middlewares=auth-elon
      - traefik.http.services.elon.loadbalancer.server.port=8080
      - 'traefik.http.middlewares.auth-elon.basicauth.users=elon:$$apr1$$zIBPKlAM$$wtLimAEoRjMo.V8ifZQli0'
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  proxy:
    external: true

volumes:
  predictor-data:
    external: true
    name: elon-tweet-predictor-data
  polymarket-bot-v2-data:
    external: true
    name: polymarket-bot-v2-data
